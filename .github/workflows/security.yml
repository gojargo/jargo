name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # Run the gitleaks binary directly via its image — the marketplace action
      # requires a paid licence for GitHub organisations.
      - name: gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest \
            dir /repo --redact --no-banner --verbose

  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy.sarif
          # Report findings (in the Security tab) without failing the build yet;
          # tighten to "1" once the baseline is clean.
          exit-code: "0"
      - name: Upload results to the Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

  plumber:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      # Plumber scans this repo's GitHub Actions pipelines for hardening gaps
      # (action pinning, overbroad permissions, curl|bash, risky triggers). It
      # uploads its SARIF to the Security tab itself (upload-sarif defaults true).
      - name: Plumber pipeline scan
        uses: getplumber/plumber@fec66e6efa296d4e09b0399c6bff981a90d2bb74 # v0.3.73
        with:
          # Gate below the action's default of 100 so CI stays green while the
          # findings still surface in the Security tab. Raise it as the pipelines
          # are hardened (SHA-pin actions, protect branches, ...).
          threshold: "75"
          soft-fail: "true"

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # govulncheck builds the packages to compute the reachable call graph;
      # jargo links libsoxr through cgo, so the dev headers must be present.
      - run: sudo apt-get update && sudo apt-get install -y libsoxr-dev
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
      # Reports only vulnerabilities jargo's code actually reaches, so this gates
      # the build. Stdlib advisories are cleared by the latest 1.26.x toolchain
      # that setup-go resolves from go.mod.
      - run: govulncheck ./...

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v7
      # CodeQL's autobuild compiles the module; cgo needs the libsoxr headers.
      - run: sudo apt-get update && sudo apt-get install -y libsoxr-dev
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: github/codeql-action/init@v3
        with:
          languages: go
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"
