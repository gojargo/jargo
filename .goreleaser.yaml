# jargo is primarily a library; goreleaser ships the runnable example bots as
# release artifacts. See https://goreleaser.com.
version: 2

project_name: jargo

before:
  hooks:
    - go mod tidy

builds:
  - id: echo
    main: ./examples/echo
    binary: jargo-echo
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
  - id: voicebot
    main: ./examples/voicebot
    binary: jargo-voicebot
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
